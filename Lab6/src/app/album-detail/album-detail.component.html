<div class="container mt-4" *ngIf="album">
  <h2>Album ID: {{ album.id }}</h2>
  
  <div class="mb-3">
    <label class="form-label">Title:</label>
    <input type="text" class="form-control" [(ngModel)]="newTitle">
  </div>

  <div class="mb-3">
    <label class="form-label">Number of photos to show:</label>
    <input type="number" class="form-control" [(ngModel)]="photoLimit" min="1">
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" (click)="saveTitle()">Save</button>
    <button class="btn btn-info text-white" (click)="viewPhotos()">View Photos</button>
    <button class="btn btn-secondary" (click)="goBack()">Return</button>
  </div>
</div>
