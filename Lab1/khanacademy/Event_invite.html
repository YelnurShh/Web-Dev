<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Project: Event invite</title>
        <style>
            body{
                background-color:rgb(242, 242, 242);
                font-family: montserrat;
            }
            
            h1{
                text-align: center;
                font-weight:bold;
                color: rgb(255, 149, 0);
                border: 3px dashed rgb(19, 255, 47);
                background-color: rgba(143, 245, 123, 0.584);
                border-radius: 17px;
            }
            
            .cont{
                position: relative;
                left: 50px;
            }

            h2{
                padding-left: 100px;
                color: rgb(255, 154, 12);
            }

            .bg{
                background-color: rgba(245, 213, 126, 0.761);
                border-radius: 20px;
                width: 500px;
                height: 500px;
                padding: 30px;
                margin-left: 415px;
                margin-top: 90px;
                border-style: ridge;
            }

            p{
                font-style: italic;
                color:blue;
            }

            .bold{
                font-weight: bold;
                line-height: 2em;
            }

            img{
                padding-left: 48px;
            }
        </style>
    </head>
    <body>
        <div class = "bg">
        <h1>You're invited!</h1>
        <h2 class = "cont">To my birthday!</h2>
        
        <p class = "cont">My dear friend I invite you to my birthday party!</p>
        <ul class = "cont">
            <li><span class = "bold">Date of the event:</span>  18 september, 2026</li>
            <li><span class = "bold">Time:</span>  18:00</li>
            <li><span class = "bold">Venue:</span>  Almaty Arena</li>
        </ul>

        <img src = "https://weezevent.com/wp-content/uploads/2019/01/12145054/organiser-soiree-1000x585.jpg" width="400" height="200">
        </div>
        
    </body>
</html>
